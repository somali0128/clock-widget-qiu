<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Fox Clock Widget</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="clock-widget" aria-label="北京时间时钟挂件">
      <section class="art-stage">
        <img class="art-layer ear-layer ear-left" src="./assets/images/ear_left.png" alt="" aria-hidden="true" />
        <img class="art-layer ear-layer ear-right" src="./assets/images/ear_right.png" alt="" aria-hidden="true" />
        <img class="art-layer background-layer" src="./assets/images/background.png" alt="" aria-hidden="true" />

        <div class="ambient-twinkles" aria-hidden="true">
          <span class="twinkle t1">✦</span>
          <span class="twinkle t2">✧</span>
          <span class="twinkle t3">✦</span>
          <span class="twinkle t4">✧</span>
          <span class="twinkle t5">✦</span>
          <span class="twinkle t6">✦</span>
        </div>

        <div class="clock-face" aria-live="polite">
          <div id="time" class="time" role="timer">00:00</div>
          <div class="date-panel">
            <span id="date" class="date">0月0日，周一</span>
          </div>
        </div>

        <img class="art-layer fox-front" src="./assets/images/fox_front.png" alt="" aria-hidden="true" />
      </section>
    </main>

    <script src="./js/clock.js"></script>
  </body>
</html>
