<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Fox Clock Widget</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="clock-widget" aria-label="北京时间时钟挂件">
      <section class="sky-stage">
        <div class="moon" aria-hidden="true"></div>
        <div class="fox-ear fox-ear-left" aria-hidden="true"></div>
        <div class="fox-ear fox-ear-right" aria-hidden="true"></div>

        <div class="star-field" aria-hidden="true">
          <span class="spark star-a">✦</span>
          <span class="spark star-b">✧</span>
          <span class="spark star-c">✦</span>
          <span class="spark star-d">✧</span>
          <span class="spark star-e">✦</span>
          <span class="spark star-f">✦</span>
          <span class="spark star-g">✧</span>
          <span class="spark star-h">✦</span>
          <span class="dot dot-a"></span>
          <span class="dot dot-b"></span>
          <span class="dot dot-c"></span>
          <span class="dot dot-d"></span>
          <span class="dot dot-e"></span>
          <span class="dot dot-f"></span>
          <span class="dot dot-g"></span>
          <span class="dot dot-h"></span>
          <span class="dot dot-i"></span>
          <span class="dot dot-j"></span>
        </div>

        <div class="hanging-star hanging-star-left" aria-hidden="true">
          <span class="string"></span>
          <span class="pendant">★</span>
        </div>
        <div class="hanging-star hanging-star-right" aria-hidden="true">
          <span class="string"></span>
          <span class="pendant">★</span>
        </div>

        <div class="cloud cloud-left" aria-hidden="true"></div>
        <div class="cloud cloud-right" aria-hidden="true"></div>
        <div class="cloud cloud-back" aria-hidden="true"></div>
        <div class="cloud-bed" aria-hidden="true"></div>

        <div class="time-wrap" aria-live="polite">
          <div id="time" class="time" role="timer">00:00:00</div>
          <div class="date-cloud">
            <span id="date" class="date">0000年00月00日 星期一</span>
          </div>
        </div>

        <div class="fox-wrap" aria-hidden="true">
          <svg class="fox" viewBox="0 0 330 210" role="img">
            <defs>
              <linearGradient id="foxBody" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#f8fdff" />
                <stop offset="48%" stop-color="#dff6ff" />
                <stop offset="100%" stop-color="#9eddf5" />
              </linearGradient>
              <linearGradient id="tailBlue" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0%" stop-color="#eefcff" />
                <stop offset="58%" stop-color="#a9e7fa" />
                <stop offset="100%" stop-color="#7ebfe7" />
              </linearGradient>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
                <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#22305f" flood-opacity=".2" />
              </filter>
            </defs>

            <path class="tail" d="M233 143C286 144 317 110 304 77C294 49 255 54 242 81C230 106 206 116 180 119C151 122 149 156 180 167C199 174 218 167 233 143Z" fill="url(#tailBlue)" />
            <path class="tail-tip" d="M284 65C307 73 311 96 300 115C292 101 278 93 259 94C265 79 273 70 284 65Z" fill="#fff7fb" />

            <ellipse cx="150" cy="139" rx="84" ry="49" fill="url(#foxBody)" filter="url(#softShadow)" />
            <path d="M82 121C72 92 87 72 114 91Z" fill="#b7e9fb" />
            <path d="M92 115C88 99 96 89 111 97Z" fill="#ffd3e8" />
            <path d="M159 88C180 59 207 69 199 106Z" fill="#b7e9fb" />
            <path d="M166 94C179 80 193 84 192 102Z" fill="#ffd3e8" />
            <circle cx="134" cy="118" r="55" fill="url(#foxBody)" filter="url(#softShadow)" />
            <path d="M87 130C102 159 153 166 179 133C174 166 146 186 112 177C83 170 66 148 75 125Z" fill="#f9feff" opacity=".96" />
            <path class="sleep-eye" d="M111 120C118 127 129 127 137 119" />
            <path class="sleep-eye" d="M151 119C158 126 169 126 177 118" />
            <path d="M135 134C141 139 149 139 155 134" fill="none" stroke="#48648c" stroke-width="4" stroke-linecap="round" />
            <ellipse cx="142" cy="128" rx="5" ry="3.5" fill="#48648c" />
            <circle cx="92" cy="135" r="8" fill="#ffd6e9" opacity=".72" />
            <circle cx="184" cy="134" r="8" fill="#ffd6e9" opacity=".72" />
            <path d="M78 170C103 188 170 191 211 171" fill="none" stroke="#f7fbff" stroke-width="18" stroke-linecap="round" opacity=".88" />
          </svg>
        </div>
      </section>
    </main>

    <script src="./js/clock.js"></script>
  </body>
</html>
